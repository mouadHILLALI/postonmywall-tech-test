# ─── Server ───────────────────────────────────────────────
server.port=8080
# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/postonmywall
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# ─── AWS S3 ───────────────────────────────────────────────
spring.cloud.aws.credentials.access-key=YOUR_AWS_ACCESS_KEY
spring.cloud.aws.credentials.secret-key=YOUR_AWS_SECRET_KEY
spring.cloud.aws.region.static=eu-west-3
postonmywall.s3.bucket=postonmywall-media
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
# ─── JWT ──────────────────────────────────────────────────
postonmywall.jwt.secret=CHANGE_ME_TO_A_256BIT_BASE64_SECRET_KEY_FOR_PRODUCTION
postonmywall.jwt.expiration-ms=86400000
# ─── Social: TikTok ───────────────────────────────────────
social.tiktok.client-key=YOUR_TIKTOK_CLIENT_KEY
social.tiktok.client-secret=YOUR_TIKTOK_CLIENT_SECRET
social.tiktok.base-url=https://open.tiktokapis.com/v2
# ─── Social: Twitter / X ──────────────────────────────────
social.twitter.api-key=YOUR_TWITTER_API_KEY
social.twitter.api-secret=YOUR_TWITTER_API_SECRET
social.twitter.bearer-token=YOUR_TWITTER_BEARER_TOKEN
social.twitter.base-url=https://api.twitter.com/2
# ─── Social: Instagram ────────────────────────────────────
social.instagram.client-id=YOUR_INSTAGRAM_CLIENT_ID
social.instagram.client-secret=YOUR_INSTAGRAM_CLIENT_SECRET
social.instagram.base-url=https://graph.facebook.com/v19.0
# ─── Social: YouTube ──────────────────────────────────────
social.youtube.client-id=YOUR_YOUTUBE_CLIENT_ID
social.youtube.client-secret=YOUR_YOUTUBE_CLIENT_SECRET
social.youtube.base-url=https://www.googleapis.com/youtube/v3
# ─── Scheduler ────────────────────────────────────────────
postonmywall.scheduler.daily-cron=0 0 9 * * *
postonmywall.scheduler.weekly-cron=0 0 9 * * MON
# ─── Logging ──────────────────────────────────────────────
logging.level.com.postonmywall=DEBUG
logging.level.org.springframework.security=WARN
