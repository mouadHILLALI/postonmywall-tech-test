# ─── Server ───────────────────────────────────────────────
server.port=8080
# ─── Database ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postonmywall}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# ─── AWS S3 ───────────────────────────────────────────────
spring.cloud.aws.credentials.access-key=${SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY}
spring.cloud.aws.region.static=eu-west-3
postonmywall.s3.bucket=${POSTONMYWALL_S3_BUCKET:postonmywall-media}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
# ─── JWT ──────────────────────────────────────────────────
postonmywall.jwt.secret=${POSTONMYWALL_JWT_SECRET}
postonmywall.jwt.expiration-ms=86400000
# ─── Social: TikTok ───────────────────────────────────────
social.tiktok.client-key=${SOCIAL_TIKTOK_CLIENT_KEY}
social.tiktok.client-secret=${SOCIAL_TIKTOK_CLIENT_SECRET}
social.tiktok.base-url=https://open.tiktokapis.com/v2
# ─── Social: Twitter / X ──────────────────────────────────
social.twitter.api-key=${SOCIAL_TWITTER_API_KEY}
social.twitter.api-secret=${SOCIAL_TWITTER_API_SECRET}
social.twitter.bearer-token=${SOCIAL_TWITTER_BEARER_TOKEN}
social.twitter.base-url=https://api.twitter.com/2
# ─── Social: Instagram ────────────────────────────────────
social.instagram.client-id=${SOCIAL_INSTAGRAM_CLIENT_ID}
social.instagram.client-secret=${SOCIAL_INSTAGRAM_CLIENT_SECRET}
social.instagram.base-url=https://graph.instagram.com
# ─── Social: YouTube ──────────────────────────────────────
social.youtube.client-id=${SOCIAL_YOUTUBE_CLIENT_ID}
social.youtube.client-secret=${SOCIAL_YOUTUBE_CLIENT_SECRET}
social.youtube.base-url=https://www.googleapis.com/youtube/v3
# ─── OAuth2 ───────────────────────────────────────────────
oauth.callback-base-url=${CALLBACK_BASE_URL:http://localhost:8080}
oauth.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}

oauth.twitter.client-id=${OAUTH_TWITTER_CLIENT_ID}
oauth.twitter.client-secret=${OAUTH_TWITTER_CLIENT_SECRET}

oauth.instagram.client-id=${OAUTH_INSTAGRAM_CLIENT_ID}
oauth.instagram.client-secret=${OAUTH_INSTAGRAM_CLIENT_SECRET}

oauth.tiktok.client-key=${OAUTH_TIKTOK_CLIENT_KEY}
oauth.tiktok.client-secret=${OAUTH_TIKTOK_CLIENT_SECRET}
oauth.tiktok.callback-base-url=${TIKTOK_CALLBACK_BASE_URL:}

oauth.youtube.client-id=${OAUTH_YOUTUBE_CLIENT_ID}
oauth.youtube.client-secret=${OAUTH_YOUTUBE_CLIENT_SECRET}
# ─── Scheduler ────────────────────────────────────────────
postonmywall.scheduler.daily-cron=0 0 9 * * *
postonmywall.scheduler.weekly-cron=0 0 9 * * MON
# ─── Multipart upload limits ──────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# ─── Logging ──────────────────────────────────────────────
logging.level.com.postonmywall=DEBUG
logging.level.org.springframework.security=WARN
