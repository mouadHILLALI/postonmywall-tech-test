social.twitter.base-url=https://api.twitter.com/2
# ─── Social: Instagram ────────────────────────────────────
social.instagram.client-id=YOUR_INSTAGRAM_CLIENT_ID
social.instagram.client-secret=YOUR_INSTAGRAM_CLIENT_SECRET
social.instagram.base-url=https://graph.facebook.com/v19.0
# ─── Social: YouTube ──────────────────────────────────────
social.youtube.client-id=YOUR_YOUTUBE_CLIENT_ID
social.youtube.client-secret=YOUR_YOUTUBE_CLIENT_SECRET
social.youtube.base-url=https://www.googleapis.com/youtube/v3
# ─── OAuth2 ───────────────────────────────────────────────
# Base URL of THIS backend — registered as redirect_uri with each platform
oauth.callback-base-url=http://localhost:8080

# Twitter / X  (developer.twitter.com > App > User authentication settings)
oauth.twitter.client-id=YOUR_TWITTER_CLIENT_ID
oauth.twitter.client-secret=YOUR_TWITTER_CLIENT_SECRET

# Instagram    (developers.facebook.com > App > Facebook Login)
oauth.instagram.client-id=YOUR_META_APP_ID
oauth.instagram.client-secret=YOUR_META_APP_SECRET

# TikTok       (developers.tiktok.com > App > Login Kit)
oauth.tiktok.client-key=YOUR_TIKTOK_CLIENT_KEY
oauth.tiktok.client-secret=YOUR_TIKTOK_CLIENT_SECRET

# YouTube      (console.cloud.google.com > OAuth 2.0 Client IDs)
oauth.youtube.client-id=YOUR_GOOGLE_CLIENT_ID
oauth.youtube.client-secret=YOUR_GOOGLE_CLIENT_SECRET

# ─── Scheduler ────────────────────────────────────────────
postonmywall.scheduler.daily-cron=0 0 9 * * *
postonmywall.scheduler.weekly-cron=0 0 9 * * MON
# ─── Multipart upload limits ──────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# ─── Logging ──────────────────────────────────────────────
logging.level.com.postonmywall=DEBUG
logging.level.org.springframework.security=WARN
